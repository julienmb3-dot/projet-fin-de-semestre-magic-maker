<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" type="text/css" href="static\style.css">
    <script defer src="static\script.js"></script>
</head>
<body class="bg-[#50D4C7]">
    <header>
        {% if session["user"] %}
            <p>connecter en tant que {{session["user"]}}</p>
        {% endif %}
        
        <section class="bg-gradient-to-bl from-[#F4FC5F] to-[#5FFCB5] text-center">
            <div>
                <p class="pt-4"></p>
                <a href="/" class="font-bold py-5 text-3xl">Spoon Box Rush</a>
                <p class="pb-5"></p>
            </div>
            <div class="text-center mb-6">
                {% if not(session["user"]) %}
                    <a href="/login" class="rounded-lg px-3 py-1 text-white font-semibold mx-2 bg-gradient-to-t from-[#B55FFC] to-[#675FFC]" type="submit">Se connecter</a>
                    <a href="/signup"class="rounded-lg px-3 py-1 text-white font-semibold mx-2 bg-gradient-to-t from-[#B55FFC] to-[#675FFC]" type="submit">S'enregistrer</a>
                    <p class="pb-3"></p>
                {% else %}
                    <a href="/play" class="rounded-lg px-3 py-1 text-white font-semibold mb-3 mx-2 bg-gradient-to-t from-[#B55FFC] to-[#675FFC]" type="submit">JOUER !</a>
                    <a href="/logout" class="rounded-lg px-3 py-1 text-white font-semibold mb-3 mx-2 bg-gradient-to-t from-[#B55FFC] to-[#675FFC]" type="submit">Se déconnecter</a>

                    <a href="/admin" class="rounded-lg px-3 py-1 text-white font-semibold mb-3 mx-2 bg-gradient-to-t from-[#C40D03] to-[#FC0370]" type="submit">Page administrateur</a>

                    <p class="pb-3"></p>
                {% endif %}
            </div>

        </section>
        
    </header>

    {% block content%}
    {% endblock %}

    
    <footer>

    </footer>
</body>
</html>
